纯静态的 Gist/htmlpreview 页面没有后端，无法直接挂载数据库，但有几个适合这个场景的方案：

方案一：JSONBin.io（最推荐，零成本）

免费的 REST JSON 存储，每个"bin"就是一个 JSON 文档，通过 API 读写。

免费版足够个人用
直接在 HTML 里用 fetch 调用
多设备同步数据
每个用户对应一个 bin，用 API Key + bin ID 隔离数据
大致思路：

注册账号 → 创建 bin → 把 bin ID 存 localStorage
→ 登录时 fetch 拉取数据 → 打卡时 PUT 更新数据
方案二：Supabase（功能最强）

真正的 PostgreSQL 数据库，免费套餐够用。支持用户认证（直接替换掉现在的本地登录）+ 数据存储，彻底解决多设备问题。

方案三：Firebase Firestore（Google）

和 Supabase 类似，免费额度充足，纯前端 SDK 可直接在 HTML 里引入。

方案四：继续用 localStorage（现状）

数据只在当前设备/浏览器，换设备或清缓存就没了。适合单人单设备。

我的建议：

需求	推荐方案
只自己用，不换设备	继续 localStorage
多设备同步，想简单	JSONBin.io
多用户，想要真正的账号系统	Supabase

sql
-- 打卡记录表
create table records (
  id uuid default gen_random_uuid() primary key,
  user_id uuid references auth.users(id) on delete cascade not null,
  record_date date not null,
  done boolean not null,
  created_at timestamptz default now(),
  unique(user_id, record_date)
);

-- 开启行级安全（每人只能读写自己的数据）
alter table records enable row level security;

create policy "用户只能读自己的记录"
  on records for select
  using (auth.uid() = user_id);

create policy "用户只能插入自己的记录"
  on records for insert
  with check (auth.uid() = user_id);

create policy "用户只能更新自己的记录"
  on records for update
  using (auth.uid() = user_id);

create policy "用户只能删除自己的记录"
  on records for delete
  using (auth.uid() = user_id);

      --shadow: 0 4px 24px rgba(0,0,0,0.08); --shadow-md: 0 8px 32px rgba(0,0,0,0.12);
    }
    body { font-family:'Noto Sans SC','Microsoft YaHei',sans-serif; background:var(--bg); min-height:100vh; display:flex; justify-content:center; padding:24px 16px 48px; color:var(--text); }

    /* LOADING */
    #loadingScreen { width:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; min-height:60vh; align-self:center; }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    #loadingScreen p { font-size:13px; color:var(--text3); }

    /* AUTH */
    #authScreen { display:none; width:100%; max-width:400px; flex-direction:column; gap:0; align-self:center; }
    #authScreen.visible { display:flex; }
    .auth-logo { text-align:center; margin-bottom:32px; }
    .auth-logo-icon { width:60px; height:60px; background:var(--accent); border-radius:18px; display:flex; align-items:center; justify-content:center; margin:0 auto 14px; }
    .auth-logo-icon svg { color:#fff; width:30px; height:30px; }
    .auth-logo h1 { font-size:20px; font-weight:700; }
    .auth-logo p { font-size:13px; color:var(--text3); margin-top:4px; }
    .auth-card { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); padding:28px 24px; box-shadow:var(--shadow); }
    .auth-tabs { display:grid; grid-template-columns:1fr 1fr; gap:4px; background:var(--surface2); border-radius:var(--radius-sm); padding:4px; margin-bottom:24px; }
    .auth-tab { padding:9px; border:none; border-radius:8px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; background:transparent; color:var(--text3); transition:all .15s; }
    .auth-tab.active { background:var(--surface); color:var(--text); box-shadow:0 1px 4px rgba(0,0,0,0.1); }
    .auth-form { display:flex; flex-direction:column; gap:14px; }
    .auth-form.hidden { display:none; }
    .field { display:flex; flex-direction:column; gap:6px; }
    .field label { font-size:12px; font-weight:700; color:var(--text2); }
    .field input, .field textarea { padding:11px 14px; border-radius:var(--radius-sm); border:1.5px solid var(--border); font-family:inherit; font-size:14px; color:var(--text); background:var(--surface); outline:none; transition:border-color .15s; }
    .field input:focus, .field textarea:focus { border-color:var(--accent); }
    .field textarea { resize:vertical; min-height:72px; line-height:1.5; }
    .auth-error { font-size:12px; color:var(--red-dark); background:var(--red-light); padding:9px 12px; border-radius:var(--radius-sm); display:none; }
    .auth-error.show { display:block; }
    .auth-submit { padding:13px; border-radius:var(--radius-sm); border:none; background:var(--accent); color:#fff; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; transition:background .12s,transform .1s; margin-top:4px; }
    .auth-submit:hover { background:var(--accent-dark); }
    .auth-submit:active { transform:scale(0.98); }
    .auth-submit:disabled { opacity:.6; cursor:not-allowed; transform:none; }
    .auth-hint { font-size:12px; color:var(--text3); text-align:center; margin-top:16px; line-height:1.6; }

    /* APP */
    #appScreen { display:none; width:100%; max-width:480px; flex-direction:column; gap:16px; }
    #appScreen.visible { display:flex; }

    /* TABS NAV */
    .nav-tabs { display:flex; gap:4px; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); padding:6px; box-shadow:var(--shadow); }
    .nav-tab { flex:1; padding:10px 6px; border:none; border-radius:var(--radius-sm); font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; background:transparent; color:var(--text3); transition:all .15s; display:flex; flex-direction:column; align-items:center; gap:4px; }
    .nav-tab svg { width:18px; height:18px; }
    .nav-tab.active { background:var(--accent); color:#fff; }
    .nav-tab.admin-tab { color:var(--orange); }
    .nav-tab.admin-tab.active { background:var(--orange); color:#fff; }

    /* TOPBAR */
    .topbar { display:flex; align-items:center; justify-content:space-between; padding:4px 0; }
    .topbar h1 { font-size:18px; font-weight:700; }
    .topbar .date { font-size:12px; color:var(--text3); margin-top:2px; }
    .sync-dot { width:6px; height:6px; border-radius:50%; background:var(--green); display:inline-block; margin-left:6px; vertical-align:middle; }
    .sync-dot.syncing { background:#f6ad55; animation:pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .user-pill { display:flex; align-items:center; gap:7px; background:var(--surface); border:1px solid var(--border); border-radius:40px; padding:6px 12px 6px 8px; box-shadow:var(--shadow); }
    .user-avatar { width:26px; height:26px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; }
    .user-name { font-size:13px; font-weight:700; color:var(--text); max-width:100px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .icon-btn { background:none; border:none; cursor:pointer; color:var(--text3); padding:4px; display:flex; align-items:center; border-radius:8px; transition:all .1s; }
    .icon-btn:hover { color:var(--red); background:var(--red-light); }
    .icon-btn svg { width:16px; height:16px; }

    /* CARD */
    .card { background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); padding:20px; box-shadow:var(--shadow); }
    .card-title { font-size:12px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:.8px; margin-bottom:16px; }

    /* TODAY BANNER */
    .today-banner { display:none; align-items:center; gap:10px; padding:12px 16px; border-radius:var(--radius-sm); margin-bottom:16px; font-size:14px; font-weight:500; }
    .today-banner.done { background:var(--green-light); color:var(--green-dark); }
    .today-banner.skip { background:var(--red-light); color:var(--red-dark); }
    .today-banner svg { flex-shrink:0; width:18px; height:18px; }

    /* BTNS */
    .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .action-btn { padding:18px 12px; border-radius:var(--radius-sm); border:1.5px solid; background:var(--surface); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:8px; transition:all .12s; font-family:inherit; }
    .action-btn:active { transform:scale(0.96); }
    .action-btn:disabled { opacity:.5; cursor:not-allowed; transform:none !important; }
    .action-btn svg { width:30px; height:30px; }
    .action-btn span { font-size:13px; font-weight:700; }
    .btn-yes { border-color:var(--green); color:var(--green-dark); }
    .btn-yes:hover:not(:disabled) { background:var(--green-light); }
    .btn-yes svg { color:var(--green); }
    .btn-no { border-color:var(--red); color:var(--red-dark); }
    .btn-no:hover:not(:disabled) { background:var(--red-light); }
    .btn-no svg { color:var(--red); }

    /* STATS */
    .stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .stat { background:var(--surface2); border-radius:var(--radius-sm); padding:14px 10px; text-align:center; border:1px solid var(--border); }
    .stat-num { font-size:22px; font-weight:700; color:var(--text); line-height:1; }
    .stat-lbl { font-size:11px; color:var(--text3); margin-top:5px; }

    /* CALENDAR */
    .cal-nav-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .cal-nav-row span { font-size:14px; font-weight:700; }
    .cal-btn { background:none; border:none; cursor:pointer; color:var(--text2); padding:4px 10px; border-radius:8px; font-size:18px; transition:background .1s; }
    .cal-btn:hover { background:var(--surface2); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-dow { font-size:11px; color:var(--text3); text-align:center; padding:4px 0; font-weight:500; }
    .cal-day { aspect-ratio:1; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text3); cursor:default; position:relative; }
    .cal-day.clickable { cursor:pointer; transition:opacity .1s; }
    .cal-day.clickable:hover { opacity:.8; }
    .cal-day.has-done { background:var(--green); color:#fff; font-weight:700; }
    .cal-day.has-skip { background:var(--red); color:#fff; font-weight:700; }
    .cal-day.has-note::after { content:''; position:absolute; bottom:2px; right:2px; width:5px; height:5px; border-radius:50%; background:#f6ad55; }
    .cal-day.is-today { outline:2px solid var(--accent); outline-offset:1px; }
    .cal-day.future { opacity:.3; }

    /* LOG */
    .log-list { display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; }
    .log-item { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; padding:10px 14px; background:var(--surface2); border-radius:var(--radius-sm); border:1px solid var(--border); }
    .log-left { display:flex; flex-direction:column; gap:3px; flex:1; min-width:0; }
    .log-date { font-size:13px; color:var(--text2); font-weight:500; }
    .log-note { font-size:12px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }
    .badge { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; white-space:nowrap; flex-shrink:0; }
    .badge-done { background:var(--green-light); color:var(--green-dark); }
    .badge-skip { background:var(--red-light); color:var(--red-dark); }
    .log-empty { font-size:13px; color:var(--text3); text-align:center; padding:20px; }

    /* CHART SECTION */
    .chart-wrap { position:relative; width:100%; }
    canvas { width:100% !important; }
    .chart-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
    .chart-tab { padding:5px 14px; border-radius:20px; border:1.5px solid var(--border); font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; background:transparent; color:var(--text3); transition:all .15s; }
    .chart-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }

    /* EXPORT */
    .export-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .export-btn { padding:9px 16px; border-radius:var(--radius-sm); border:1.5px solid var(--accent); background:transparent; color:var(--accent); font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:all .12s; display:flex; align-items:center; gap:6px; }
    .export-btn:hover { background:var(--accent-light); }
    .export-btn svg { width:15px; height:15px; }

    /* ADMIN */
    .admin-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:3px 8px; border-radius:20px; background:var(--orange-light); color:var(--orange); margin-left:6px; }
    .admin-user-card { background:var(--surface2); border-radius:var(--radius-sm); border:1px solid var(--border); padding:14px 16px; }
    .admin-user-header { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
    .admin-user-name { font-size:14px; font-weight:700; }
    .admin-user-stats { display:flex; gap:10px; margin-top:10px; }
    .admin-stat { font-size:12px; color:var(--text2); background:var(--surface); padding:6px 10px; border-radius:8px; border:1px solid var(--border); }
    .admin-stat strong { color:var(--text); display:block; font-size:16px; font-weight:700; }
    .admin-cal-mini { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-top:10px; }
    .mini-day { aspect-ratio:1; border-radius:3px; font-size:9px; display:flex; align-items:center; justify-content:center; color:var(--text3); background:var(--border); }
    .mini-day.done { background:var(--green); color:#fff; }
    .mini-day.skip { background:var(--red); color:#fff; }
    .admin-filter { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
    .admin-filter label { font-size:12px; font-weight:700; color:var(--text2); }
    .admin-filter input[type=month] { padding:7px 10px; border-radius:var(--radius-sm); border:1.5px solid var(--border); font-family:inherit; font-size:13px; outline:none; }
    .admin-filter input:focus { border-color:var(--accent); }
    .users-list { display:flex; flex-direction:column; gap:10px; }
    .expand-icon { transition:transform .2s; }
    .expanded .expand-icon { transform:rotate(180deg); }
    .admin-detail { display:none; }
    .admin-user-card.expanded .admin-detail { display:block; }

    /* PAGE VIEWS */
    .page { display:none; flex-direction:column; gap:16px; }
    .page.active { display:flex; }

    /* MODALS */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45); display:flex; align-items:center; justify-content:center; padding:20px; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.active { opacity:1; pointer-events:all; }
    .modal { background:var(--surface); border-radius:var(--radius); padding:28px 24px; max-width:360px; width:100%; box-shadow:var(--shadow-md); transform:scale(0.92) translateY(12px); transition:transform .25s cubic-bezier(0.175,0.885,0.32,1.275); }
    .modal-overlay.active .modal { transform:scale(1) translateY(0); }
    .modal-icon { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
    .modal-icon.red { background:var(--red-light); } .modal-icon.red svg { color:var(--red); }
    .modal-icon.blue { background:var(--accent-light); } .modal-icon.blue svg { color:var(--accent); }
    .modal-icon svg { width:28px; height:28px; }
    .modal h3 { font-size:17px; font-weight:700; margin-bottom:8px; text-align:center; }
    .modal p { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:16px; text-align:center; }
    .modal-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
    .modal-btn { padding:11px; border-radius:var(--radius-sm); border:1.5px solid; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; transition:all .12s; }
    .modal-btn:active { transform:scale(0.97); }
    .modal-btn-cancel { border-color:var(--border); background:var(--surface2); color:var(--text2); }
    .modal-btn-cancel:hover { background:#edf2f7; }
    .modal-btn-red { border-color:var(--red); background:var(--red); color:#fff; }
    .modal-btn-red:hover { background:#c53030; }
    .modal-btn-accent { border-color:var(--accent); background:var(--accent); color:#fff; }
    .modal-btn-accent:hover { background:var(--accent-dark); }
    .modal-btn-full { grid-column:1/-1; }

    /* TOAST */
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(16px); background:#1a202c; color:#fff; font-size:13px; font-weight:500; padding:10px 20px; border-radius:40px; white-space:nowrap; opacity:0; pointer-events:none; transition:all .25s; z-index:200; box-shadow:0 4px 16px rgba(0,0,0,.2); }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    .log-list::-webkit-scrollbar,.users-list::-webkit-scrollbar { width:4px; }
    .log-list::-webkit-scrollbar-thumb,.users-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

    .section-title { font-size:15px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen">
  <div class="spinner"></div>
  <p>正在连接…</p>
</div>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-logo">
    <div class="auth-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <h1>每日导管记录</h1>
    <p>数据云端同步，多设备共享</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>
    <div class="auth-form" id="loginForm">
      <div class="field"><label>邮箱</label><input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email"/></div>
      <div class="field"><label>密码</label><input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password"/></div>
      <div class="auth-error" id="loginError"></div>
      <button class="auth-submit" id="loginBtn" onclick="doLogin()">登录</button>
    </div>
    <div class="auth-form hidden" id="registerForm">
      <div class="field"><label>邮箱</label><input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email"/></div>
      <div class="field"><label>密码</label><input type="password" id="regPass" placeholder="至少6个字符" autocomplete="new-password"/></div>
      <div class="field"><label>确认密码</label><input type="password" id="regPass2" placeholder="再次输入密码" autocomplete="new-password"/></div>
      <div class="auth-error" id="registerError"></div>
      <button class="auth-submit" id="registerBtn" onclick="doRegister()">创建账号</button>
    </div>
  </div>
  <p class="auth-hint">数据存储于 Supabase 云端，支持多设备同步</p>
</div>

<!-- APP -->
<div id="appScreen">

  <!-- topbar -->
  <div class="topbar">
    <div>
      <h1>导管记录 <span class="sync-dot" id="syncDot"></span></h1>
      <div class="date" id="headerDate"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar"></div>
        <span class="user-name" id="userName"></span>
      </div>
      <button class="icon-btn" onclick="doLogout()" title="退出">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- nav -->
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" onclick="showPage('pageHome')" id="navHome">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      打卡
    </button>
    <button class="nav-tab" onclick="showPage('pageStats')" id="navStats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      统计
    </button>
    <button class="nav-tab" onclick="showPage('pageLog')" id="navLog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      记录
    </button>
    <button class="nav-tab admin-tab" onclick="showPage('pageAdmin')" id="navAdmin" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      管理
    </button>
  </div>

  <!-- PAGE: HOME -->
  <div class="page active" id="pageHome">
    <div class="card">
      <div class="today-banner" id="todayBanner">
        <svg id="bannerIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg>
        <span id="bannerText"></span>
      </div>
      <div class="btn-row">
        <button class="action-btn btn-yes" id="btnYes" onclick="clickRecord(true)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11.5 14.5 15.5 9.5"/></svg>
          <span>今日已导管</span>
        </button>
        <button class="action-btn btn-no" id="btnNo" onclick="showNoModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>
          <span>今日未导管</span>
        </button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">本月统计</div>
      <div class="stats-grid">
        <div class="stat"><div class="stat-num" id="s1">—</div><div class="stat-lbl">累计导管</div></div>
        <div class="stat"><div class="stat-num" id="s2">—</div><div class="stat-lbl">连续天数</div></div>
        <div class="stat"><div class="stat-num" id="s3">—</div><div class="stat-lbl">本月完成率</div></div>
      </div>
    </div>

/* ── STATS CALC ── */
function calcStreak() {
  let s=0,d=new Date();
  while(true){
    const k=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    if(records[k]?.done===true){s++;d.setDate(d.getDate()-1);}else break;
  }
  return s;
}
function calcMaxStreak() {
  const keys=Object.keys(records).filter(k=>records[k]?.done).sort();
  let max=0,cur=0,prev=null;
  keys.forEach(k=>{
    if(prev){
      const d1=new Date(prev),d2=new Date(k);
      const diff=(d2-d1)/86400000;
      cur = diff===1 ? cur+1 : 1;
    } else cur=1;
    max=Math.max(max,cur); prev=k;
  });
  return max;
}
function calcMonthRate(y,m) {
  const now=new Date(), isCurrent=y===now.getFullYear()&&m===now.getMonth();
  const limit=isCurrent?now.getDate():new Date(y,m+1,0).getDate();
  let done=0,total=0;
  for(let d=1;d<=limit;d++){
    const k=`${y}-${pad(m+1)}-${pad(d)}`;
    if(records[k]!==undefined){total++;if(records[k]?.done)done++;}
  }
  return total>0?Math.round(done/total*100)+'%':'—';
}
function calcOverallRate() {
  const vals=Object.values(records);
  if(!vals.length) return '—';
  const done=vals.filter(v=>v?.done).length;
  return Math.round(done/vals.length*100)+'%';
}

  } else {
    el.className='today-banner skip';
    icon.innerHTML='<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>';

}
function renderStats() {
  document.getElementById('s1').textContent=Object.values(records).filter(v=>v?.done).length;
  document.getElementById('s2').textContent=calcStreak();
  document.getElementById('s3').textContent=calcMonthRate(calYear,calMonth);
}
function renderCalendar() {
  const now=new Date(), todayStr=todayKey();
  document.getElementById('calTitle').textContent=`${calYear}年${calMonth+1}月`;
  const dows=['日','一','二','三','四','五','六'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<first;i++) html+='<div></div>';
  for(let d=1;d<=days;d++){
    const k=`${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const isToday=k===todayStr, isFuture=new Date(calYear,calMonth,d)>now&&!isToday;
    const r=records[k];
    let cls='cal-day';
    if(r?.done===true)cls+=' has-done'; else if(r?.done===false)cls+=' has-skip';
    if(r?.note)cls+=' has-note';
    if(isToday)cls+=' is-today';
    if(isFuture)cls+=' future';
    const clickable=r!==undefined&&!isFuture;
    if(clickable)cls+=' clickable';
    html+=`<div class="${cls}" ${clickable?`onclick="openDayModal('${k}')"`:''} title="${r?.note||''}">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
window.changeMonth = delta => {
  calMonth+=delta;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  render();
};

/* ── RENDER STATS PAGE ── */
function renderCharts() {
  // global stats
  document.getElementById('ss1').textContent=Object.values(records).filter(v=>v?.done).length;
  document.getElementById('ss2').textContent=calcMaxStreak();
  document.getElementById('ss3').textContent=calcOverallRate();
  buildChart();
}
function getMonthlyData() {
  const months={};
  Object.entries(records).forEach(([k,v])=>{
    const ym=k.slice(0,7);
    if(!months[ym])months[ym]={done:0,total:0};
    months[ym].total++;
    if(v?.done)months[ym].done++;
  });
  const sorted=Object.keys(months).sort().slice(-12);
  return sorted.map(ym=>({
    label:ym.replace('-','年')+'月',
    done:months[ym].done,
    total:months[ym].total,
    rate:months[ym].total>0?Math.round(months[ym].done/months[ym].total*100):0
  }));
}
function buildChart(){
  const data=getMonthlyData();
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  const ctx=document.getElementById('chartMain').getContext('2d');
  if(currentChartType==='bar'){
    chartInstance=new Chart(ctx,{
      type:'bar',
      data:{
        labels:data.map(d=>d.label),
        datasets:[{label:'完成率(%)',data:data.map(d=>d.rate),backgroundColor:'rgba(79,70,229,0.7)',borderRadius:6,borderSkipped:false}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
    });
  } else {
    chartInstance=new Chart(ctx,{
      type:'line',
      data:{
        labels:data.map(d=>d.label),
        datasets:[{label:'导管天数',data:data.map(d=>d.done),borderColor:'#38a169',backgroundColor:'rgba(56,161,105,0.1)',tension:.4,fill:true,pointBackgroundColor:'#38a169'}]
      },
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,ticks:{stepSize:1}}}}
    });
  }
}
window.switchChart = type => {
  currentChartType=type;
  document.querySelectorAll('.chart-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  buildChart();
};

/* ── RENDER LOG PAGE ── */
function renderFullLog() {
  const el=document.getElementById('logListFull');
  const keys=Object.keys(records).sort((a,b)=>b.localeCompare(a));
  document.getElementById('logCount').textContent=`共 ${keys.length} 条`;
  if(!keys.length){el.innerHTML='<div class="log-empty">暂无记录</div>';return;}
  el.innerHTML=keys.map(k=>{
    const [y,mo,d]=k.split('-');
    const label=`${y}年${parseInt(mo)}月${parseInt(d)}日`;
    const r=records[k];
    return `<div class="log-item" onclick="openDayModal('${k}')" style="cursor:pointer">
      <div class="log-left">
        <span class="log-date">${label}</span>
        ${r?.note?`<span class="log-note">📝 ${r.note}</span>`:''}
      </div>
      <span class="badge ${r?.done?'badge-done':'badge-skip'}">${r?.done?'已导管':'未导管'}</span>
    </div>`;
  }).join('');
}

/* ── EXPORT ── */
function toCSV(rows, filename) {
  const bom='\uFEFF';
  const content=bom+rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([content],{type:'text/csv;charset=utf-8'}));
  a.download=filename; a.click();
}
window.exportCSV = () => {
  const rows=[['日期','是否导管','备注']];
  Object.keys(records).sort().forEach(k=>{
    const r=records[k];
    rows.push([k,r?.done?'是':'否',r?.note||'']);
  });
  toCSV(rows,`导管记录_全部_${todayKey()}.csv`);
  showToast('已导出 CSV');
};
window.exportMonthCSV = () => {
  const now=new Date(), y=now.getFullYear(), m=pad(now.getMonth()+1);
  const rows=[['日期','是否导管','备注']];
  Object.keys(records).filter(k=>k.startsWith(`${y}-${m}`)).sort().forEach(k=>{
    const r=records[k]; rows.push([k,r?.done?'是':'否',r?.note||'']);
  });
  toCSV(rows,`导管记录_${y}年${m}月.csv`);
  showToast('已导出本月 CSV');
};

/* ── ADMIN ── */
async function renderAdmin() {
  if(!isAdmin) return;
  const el=document.getElementById('adminUsersList');
  el.innerHTML='<div class="log-empty">加载中…</div>';
  const monthVal=document.getElementById('adminMonth').value; // YYYY-MM

  // 拉取所有记录
  const {data:recs,error:recErr} = await sb.from('records').select('user_id,record_date,done,note');
  if(recErr){el.innerHTML='<div class="log-empty">加载失败</div>';return;}

  // 拉取所有用户邮箱（通过 profiles）
  const {data:profiles} = await sb.from('profiles').select('user_id,display_name');
  const profileMap={};
  (profiles||[]).forEach(p=>profileMap[p.user_id]=p.display_name);

  // 按用户分组
  const userMap={};
  (recs||[]).forEach(r=>{
    if(!userMap[r.user_id]) userMap[r.user_id]={records:{}};
    userMap[r.user_id].records[r.record_date]={done:r.done,note:r.note||''};
  });

  const userIds=Object.keys(userMap);
  if(!userIds.length){el.innerHTML='<div class="log-empty">暂无用户数据</div>';return;}

  el.innerHTML=userIds.map(uid=>{
    const u=userMap[uid];
    const name=profileMap[uid]||uid.slice(0,8)+'…';
    const allRecs=u.records;

    // 筛选本月
    const monthRecs=Object.entries(allRecs).filter(([k])=>k.startsWith(monthVal));
    const monthDone=monthRecs.filter(([,v])=>v.done).length;
    const monthTotal=monthRecs.length;
    const monthRate=monthTotal>0?Math.round(monthDone/monthTotal*100)+'%':'—';

    // 总计
    const totalDone=Object.values(allRecs).filter(v=>v.done).length;
    const totalAll=Object.keys(allRecs).length;

    // 本月日历mini
    const [y,m]=monthVal.split('-');
    const daysInMonth=new Date(parseInt(y),parseInt(m),0).getDate();
    let miniCal='';
    for(let d=1;d<=daysInMonth;d++){
      const k=`${y}-${m}-${pad(d)}`;
      const r=allRecs[k];
      let cls='mini-day';
      if(r?.done)cls+=' done'; else if(r?.done===false)cls+=' skip';
      miniCal+=`<div class="${cls}">${d}</div>`;
    }

    return `<div class="admin-user-card" id="acard-${uid}">
      <div class="admin-user-header" onclick="toggleAdminCard('${uid}')">
        <div>
          <span class="admin-user-name">${name}</span>
          <span style="font-size:11px;color:var(--text3);margin-left:8px">${monthVal.replace('-','年')}月：${monthDone}/${monthTotal}天 (${monthRate})</span>
        </div>
        <svg class="expand-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="admin-detail">
        <div class="admin-user-stats">
          <div class="admin-stat"><strong>${totalDone}</strong>累计导管</div>
          <div class="admin-stat"><strong>${totalAll}</strong>总记录天</div>
          <div class="admin-stat"><strong>${monthRate}</strong>本月完成率</div>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--text3);margin-bottom:6px">${monthVal.replace('-','年')}月打卡情况</div>
        <div class="admin-cal-mini">${miniCal}</div>
      </div>
    </div>`;
  }).join('');
}
window.toggleAdminCard = uid => {
  document.getElementById(`acard-${uid}`).classList.toggle('expanded');
};
window.renderAdmin = renderAdmin;

window.exportAllUsersCSV = async () => {
  const {data:recs} = await sb.from('records').select('user_id,record_date,done,note');
  const {data:profiles} = await sb.from('profiles').select('user_id,display_name');
  const pm={};(profiles||[]).forEach(p=>pm[p.user_id]=p.display_name);
  const rows=[['用户','日期','是否导管','备注']];
  (recs||[]).sort((a,b)=>a.record_date.localeCompare(b.record_date)).forEach(r=>{
    rows.push([pm[r.user_id]||r.user_id.slice(0,8),r.record_date,r.done?'是':'否',r.note||'']);
  });
  toCSV(rows,`所有用户导管记录_${todayKey()}.csv`);
  showToast('已导出所有用户数据');
};

},3000);
